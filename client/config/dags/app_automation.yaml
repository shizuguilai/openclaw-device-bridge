name: app_automation
executor: AsyncExecutor

agents:
  - name: screen_capture
    type: ScreenCaptureAgent
    depends_on: []
    config:
      format: png
      quality: 80

  - name: ui_parse
    type: UIParseAgent
    depends_on: [screen_capture]
    config:
      parse_mode: accessibility_tree
      max_elements: 30
