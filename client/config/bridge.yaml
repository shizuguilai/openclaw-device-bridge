# Bridge Client 主配置
bridge:
  id: "macbook-pro-001"
  name: "Local Bridge"

relay:
  url: "ws://127.0.0.1:8091"
  auth_token: "${BRIDGE_AUTH_TOKEN}"
  # 与 Relay 的 RELAY_WS_MAX_MESSAGE_BYTES 一致；截图 base64 超过默认 1MiB 会导致断连
  # max_ws_message_bytes: 16777216
  heartbeat_interval: 30
  reconnect_max_delay: 60
  reconnect_base_delay: 1

devices:
  adb_path: "adb"
  poll_interval: 5
  auto_discover: true
  allowed_devices: []

executor:
  default: AsyncExecutor
  timeout: 30.0
  max_concurrent_tasks: 5

# Bridge 端截图：经 Pillow 压缩/缩放后再发往 Relay（减轻 WS 延迟）
# 单次请求可通过 Web Console 或 command.params 覆盖
# screenshot:
#   format: jpeg       # png | jpeg | webp
#   quality: 72        # jpeg/webp 1–100；png 时映射为 zlib 压缩级别
#   max_width: 1080    # 0 表示不缩放；可与 max_height 同时限制在原图比例内
#   max_height: 0

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] %(message)s"
  file:
    enabled: true
    path: logs/bridge.log
    rotation: time
    when: H
    interval: 1
    backup_count: 72
  console:
    enabled: true
  device_log:
    enabled: true
    dir: logs/devices
  audit_log:
    enabled: true
    path: logs/audit/operations.log

security:
  allowed_actions: []
  blocked_packages: []
  require_confirmation: false
  max_shell_timeout: 10
